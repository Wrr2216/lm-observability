# Copy to .github/workflows/docker-publish.yml in your project.
#
# Required secrets (Settings -> Secrets and variables -> Actions -> Secrets):
#   DOCKERHUB_TOKEN   - Docker Hub access token
#   NTFY_TOKEN        - optional, only if your ntfy topic requires auth
#
# Required repo vars (Settings -> Secrets and variables -> Actions -> Variables):
#   DOCKERHUB_USERNAME  - your Docker Hub username (image is pushed to <user>/<repo>)
#   NTFY_URL            - base URL of your ntfy server (e.g. https://ntfy.example.com)
#   NTFY_TOPIC          - optional, defaults to the repo name

name: Build & Publish Docker Image

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
  NTFY_URL: ${{ vars.NTFY_URL }}
  NTFY_TOPIC: ${{ vars.NTFY_TOPIC || github.event.repository.name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Validate configuration
        run: |
          if [ -z "${{ vars.DOCKERHUB_USERNAME }}" ]; then
            echo "::error::Repo variable DOCKERHUB_USERNAME is required" && exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Notify build start
        if: env.NTFY_URL != ''
        run: |
          curl -s -X POST "${NTFY_URL}/${NTFY_TOPIC}" \
            -H "Title: ${IMAGE_NAME} build started" \
            -H "Tags: hammer_and_wrench" \
            -H "Priority: low" \
            ${NTFY_TOKEN:+-H "Authorization: Bearer ${NTFY_TOKEN}"} \
            -d "Commit ${GITHUB_SHA::7} on ${GITHUB_REF_NAME}" || true
        env:
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify success
        if: success() && env.NTFY_URL != ''
        run: |
          curl -s -X POST "${NTFY_URL}/${NTFY_TOPIC}" \
            -H "Title: ${IMAGE_NAME} build succeeded" \
            -H "Tags: white_check_mark" \
            -H "Priority: default" \
            ${NTFY_TOKEN:+-H "Authorization: Bearer ${NTFY_TOKEN}"} \
            -d "Pushed digest ${{ steps.build.outputs.digest }}"
        env:
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}

      - name: Notify failure
        if: failure() && env.NTFY_URL != ''
        run: |
          curl -s -X POST "${NTFY_URL}/${NTFY_TOPIC}" \
            -H "Title: ${IMAGE_NAME} build FAILED" \
            -H "Tags: x,rotating_light" \
            -H "Priority: high" \
            ${NTFY_TOKEN:+-H "Authorization: Bearer ${NTFY_TOKEN}"} \
            -d "Failed run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        env:
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
